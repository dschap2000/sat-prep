<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAT Practice Activity</title>
  <style>
    /* Clean, modern sans-serif font stack for readability */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      background-color: #f4f7f6;
      color: #333;
      line-height: 1.6;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .quiz-container {
      background: #ffffff;
      max-width: 700px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 40px;
      box-sizing: border-box;
    }

    h1 {
      margin-top: 0;
      color: #1a365d;
      font-size: 24px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 15px;
    }

    .question-header {
      font-weight: 600;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .question-text {
      font-size: 18px;
      margin-bottom: 25px;
    }

    /* Options Styling */
    .options-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 25px;
    }

    .option-label {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      padding: 15px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 16px;
      display: flex;
      align-items: center;
    }

    .option-label:hover {
      border-color: #cbd5e1;
      background: #f1f5f9;
    }

    .option-label input[type="radio"] {
      margin-right: 15px;
      transform: scale(1.2);
    }

    /* Free Response Styling */
    .free-response-input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      box-sizing: border-box;
      margin-bottom: 25px;
      font-family: inherit;
    }

    .free-response-input:focus {
      outline: none;
      border-color: #3182ce;
    }

    /* Buttons */
    .btn {
      background: #3182ce;
      color: #fff;
      border: none;
      padding: 15px 25px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
      width: 100%;
      font-family: inherit;
    }

    .btn:hover {
      background: #2b6cb0;
    }

    .btn:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    /* Feedback & Explanation */
    .feedback {
      margin-top: 25px;
      padding: 20px;
      border-radius: 8px;
      display: none;
    }

    .feedback.correct {
      background: #f0fff4;
      border-left: 5px solid #48bb78;
    }

    .feedback.incorrect {
      background: #fff5f5;
      border-left: 5px solid #f56565;
    }

    .feedback-status {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .feedback.correct .feedback-status { color: #2f855a; }
    .feedback.incorrect .feedback-status { color: #c53030; }

    /* Clean bullet points for explanations */
    .explanation ul {
      margin-top: 10px;
      padding-left: 20px;
    }

    .explanation li {
      margin-bottom: 12px;
    }

    .explanation strong {
      color: #2d3748;
    }

    .next-btn {
      margin-top: 20px;
      background: #4a5568;
    }

    .next-btn:hover {
      background: #2d3748;
    }
  </style>
</head>
<body>

  <div class="quiz-container">
    <h1>SAT Practice Module</h1>
    <div id="quiz-content">
      <div class="question-header" id="q-header">Question 1 of 2</div>
      <div class="question-text" id="q-text">Loading...</div>
      
      <div id="input-area"></div>

      <button id="submit-btn" class="btn" onclick="checkAnswer()">Submit Answer</button>

      <div id="feedback-area" class="feedback">
        <div id="feedback-status" class="feedback-status"></div>
        <div id="explanation" class="explanation"></div>
        <button id="next-btn" class="btn next-btn" onclick="nextQuestion()">Next Question</button>
      </div>
    </div>
  </div>

  <script>
    // 1. Define the Questions & Structured Explanations
    const questions = [
      {
        type: 'multiple-choice',
        section: 'Reading and Writing',
        text: 'Though not closely related, the hedgehog tenrecs of Madagascar share basic ______ true hedgehogs, including protective spines, pointed snouts, and small body size—traits the two groups of mammals independently developed in response to equivalent roles in their respective habitats.',
        options: ['examples of', 'concerns about', 'indications of', 'similarities with'],
        correctAnswer: 'similarities with',
        explanation: `
          <strong>Why this is correct:</strong>
          <ul>
            <li><strong>Context:</strong> The text is comparing two distinct groups: hedgehog tenrecs and true hedgehogs.</li>
            <li><strong>Evidence:</strong> Despite not being closely related, the passage states they play equivalent roles in their habitats and developed the exact same physical traits (spines, snouts, small size).</li>
            <li><strong>Conclusion:</strong> "Similarities with" perfectly captures the fact that they resemble one another in these specific ways.</li>
          </ul>
        `
      },
      {
        type: 'free-response',
        section: 'Math (Student-Produced Response)',
        text: 'A system of two linear equations in two variables, <em>x</em> and <em>y</em>, has no solution. The first equation is 48x - 64y = 48y + 24. The second equation is ry = 1/8 + 12x. What is the value of <em>r</em>?',
        correctAnswer: '28',
        explanation: `
          <strong>Step-by-step breakdown:</strong>
          <ul>
            <li><strong>The Rule:</strong> A system has "no solution" when the lines are parallel. Written in standard form (Ax + By = C), their <em>x</em> and <em>y</em> coefficients must be proportionally equal.</li>
            <li><strong>Step 1:</strong> Convert Equation 1 to standard form.<br> 
                48x - 64y = 48y + 24 &rarr; Subtract 48y from both sides &rarr; <strong>48x - 112y = 24</strong>
            </li>
            <li><strong>Step 2:</strong> Convert Equation 2 to standard form.<br> 
                ry = 1/8 + 12x &rarr; Subtract 12x from both sides &rarr; <strong>-12x + ry = 1/8</strong>
            </li>
            <li><strong>Step 3:</strong> Find the proportion. To go from -12x (in Eq 2) to 48x (in Eq 1), you multiply by <strong>-4</strong>.</li>
            <li><strong>Step 4:</strong> Apply the exact same proportion to the <em>y</em> coefficients. <br>
                r &times; (-4) = -112. Therefore, <strong>r = 28</strong>.</li>
          </ul>
        `
      }
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    // 2. Load Question Data into the UI
    function loadQuestion() {
      const q = questions[currentQuestionIndex];
      document.getElementById('q-header').innerText = `${q.section} | Question ${currentQuestionIndex + 1} of ${questions.length}`;
      document.getElementById('q-text').innerHTML = q.text;
      
      const inputArea = document.getElementById('input-area');
      inputArea.innerHTML = ''; // Clear previous inputs

      if (q.type === 'multiple-choice') {
        const optionsHtml = q.options.map((opt, index) => `
          <label class="option-label">
            <input type="radio" name="mc-answer" value="${opt}">
            ${opt}
          </label>
        `).join('');
        inputArea.innerHTML = `<div class="options-container">${optionsHtml}</div>`;
      } else if (q.type === 'free-response') {
        inputArea.innerHTML = `<input type="text" id="fr-answer" class="free-response-input" placeholder="Type your answer here (e.g. 28)">`;
      }

      // Reset UI States
      document.getElementById('feedback-area').style.display = 'none';
      document.getElementById('submit-btn').style.display = 'block';
    }

    // 3. Evaluate the Answer
    function checkAnswer() {
      const q = questions[currentQuestionIndex];
      let userAnswer = '';

      if (q.type === 'multiple-choice') {
        const selected = document.querySelector('input[name="mc-answer"]:checked');
        if (!selected) {
          alert('Please select an answer first!');
          return;
        }
        userAnswer = selected.value;
      } else {
        const inputVal = document.getElementById('fr-answer').value.trim();
        if (!inputVal) {
          alert('Please type an answer first!');
          return;
        }
        userAnswer = inputVal;
      }

      const isCorrect = userAnswer.toString().toLowerCase() === q.correctAnswer.toString().toLowerCase();
      if (isCorrect) score++;

      // Display Feedback
      const feedbackArea = document.getElementById('feedback-area');
      const feedbackStatus = document.getElementById('feedback-status');
      
      feedbackArea.style.display = 'block';
      feedbackArea.className = 'feedback ' + (isCorrect ? 'correct' : 'incorrect');
      
      if (isCorrect) {
        feedbackStatus.innerText = '✅ Correct!';
      } else {
        feedbackStatus.innerText = `❌ Incorrect. The correct answer is: ${q.correctAnswer}`;
      }

      document.getElementById('explanation').innerHTML = q.explanation;
      document.getElementById('submit-btn').style.display = 'none';
      
      // Update Next button text if it's the last question
      if (currentQuestionIndex === questions.length - 1) {
        document.getElementById('next-btn').innerText = 'See Final Score';
      }
    }

    // 4. Move to Next Question or End Screen
    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < questions.length) {
        loadQuestion();
      } else {
        showSummary();
      }
    }

    // 5. Final Score Summary
    function showSummary() {
      document.getElementById('q-header').innerText = 'Activity Complete';
      document.getElementById('q-text').innerHTML = `You scored <strong>${score} out of ${questions.length}</strong>!`;
      document.getElementById('input-area').innerHTML = '';
      document.getElementById('feedback-area').style.display = 'none';
      
      const retryBtn = document.createElement('button');
      retryBtn.className = 'btn';
      retryBtn.innerText = 'Try Again';
      retryBtn.onclick = () => {
        currentQuestionIndex = 0;
        score = 0;
        loadQuestion();
      };
      document.getElementById('input-area').appendChild(retryBtn);
    }

    // Initialize the first question on load
    loadQuestion();
  </script>
</body>
</html>
